<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3b82f6" />
    
    <!-- SEO et description -->
    <meta name="description" content="Système d'Archivage Électronique pour le Registrariat Cosendai - Gérez vos documents efficacement, en toute sécurité." />
    <meta name="keywords" content="archivage, documents, registrariat, cosendai, gestion documentaire, SAE" />
    <meta name="author" content="Registrariat Cosendai" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Registrariat SAE - Système d'Archivage Électronique" />
    <meta property="og:description" content="Gérez vos documents efficacement, en toute sécurité" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.jpg" />
    
    <!-- PWA / Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles d'urgence (en attendant que React charge) -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #333;
      }
      
      #root {
        width: 100%;
        min-height: 100vh;
      }
      
      /* Loader animé */
      .app-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .loader-content {
        text-align: center;
        animation: fadeInUp 0.8s ease-out;
      }
      
      .loader-logo {
        width: 100px;
        height: 100px;
        background: white;
        border-radius: 24px;
        margin: 0 auto 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        animation: pulse 2s infinite;
      }
      
      .loader-logo span {
        font-size: 48px;
        font-weight: 800;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .loader-spinner {
        width: 60px;
        height: 60px;
        margin: 20px auto;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      .loader-text {
        color: white;
        font-size: 18px;
        font-weight: 500;
        margin-top: 20px;
        letter-spacing: 1px;
      }
      
      .loader-subtext {
        color: rgba(255, 255, 255, 0.8);
        font-size: 14px;
        margin-top: 10px;
        font-weight: 300;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      /* Message si JavaScript est désactivé */
      .no-script {
        background: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        max-width: 400px;
        margin: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }
      
      .no-script h1 {
        font-size: 24px;
        margin-bottom: 15px;
        color: #333;
      }
      
      .no-script p {
        color: #666;
        line-height: 1.6;
      }
      
      .no-script .icon {
        font-size: 48px;
        margin-bottom: 20px;
      }
    </style>
    
    <title>Registrariat SAE - Système d'Archivage Électronique</title>
  </head>
  <body>
    <!-- Loader qui s'affiche pendant le chargement de React -->
    <div id="loader" class="app-loader">
      <div class="loader-content">
        <div class="loader-logo">
          <span>R</span>
        </div>
        <div class="loader-spinner"></div>
        <div class="loader-text">Chargement de l'application...</div>
        <div class="loader-subtext">Système d'Archivage Électronique</div>
      </div>
    </div>

    <!-- Message si JavaScript est désactivé -->
    <noscript>
      <div class="no-script">
        <div class="icon">⚠️</div>
        <h1>JavaScript est désactivé</h1>
        <p>Pour utiliser cette application, vous devez activer JavaScript dans les paramètres de votre navigateur.</p>
      </div>
    </noscript>

    <!-- Point d'entrée React -->
    <div id="root"></div>

    <!-- Script pour cacher le loader quand React est chargé -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loader = document.getElementById('loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(function() {
              loader.style.display = 'none';
            }, 500);
          }
        }, 800);
      });
    </script>
  </body>
</html>
